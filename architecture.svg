<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Scheduled Agent -->
  <rect x="68" y="40" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="178" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Scheduled agent</text>
  <text x="178" y="78" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">cron: 0 9 * * *</text>

  <!-- Telegram User Message -->
  <rect x="392" y="40" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="502" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Telegram message</text>
  <text x="502" y="78" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">"What's NVDA at?"</text>

  <!-- Arrows down to Claude Code Session -->
  <line x1="178" y1="96" x2="178" y2="130" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="502" y1="96" x2="502" y2="130" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="178" y1="130" x2="340" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="502" y1="130" x2="340" y2="160" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Claude Code Session -->
  <rect x="160" y="160" width="360" height="120" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="186" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Claude Code session</text>
  <text x="340" y="206" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">--channels telegram</text>

  <!-- MCP Server(s) (nested) -->
  <rect x="220" y="222" width="240" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="244" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">MCP server(s)</text>

  <!-- Arrow down to Telegram Plugin -->
  <line x1="340" y1="280" x2="340" y2="320" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Telegram Channel Plugin -->
  <rect x="180" y="320" width="320" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="344" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Telegram channel plugin</text>
  <text x="340" y="364" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Bidirectional: receives chat, sends replies</text>

  <!-- Upward arrow for bidirectional -->
  <line x1="340" y1="320" x2="340" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow down to Telegram Bot -->
  <line x1="340" y1="390" x2="340" y2="426" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Telegram Bot/Channel -->
  <rect x="160" y="426" width="360" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="450" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Telegram bot / channel</text>
  <text x="340" y="470" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Daily updates + interactive Q&amp;A</text>
</svg>
